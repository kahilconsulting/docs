<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentFlow XP - Student Lifecycle Journey</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230F295E'/%3E%3Cpath d='M16 7L5 13l11 6 11-6z' fill='%232FA6A4'/%3E%3Cpath d='M9 16.5v5.5c0 1.66 3.13 3 7 3s7-1.34 7-3V16.5' stroke='%232FA6A4' stroke-width='1.8' stroke-linecap='round' fill='none'/%3E%3Cpath d='M27 13v5' stroke='white' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F0F0F0;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .page-header {
      background: #0F295E;
      padding: 0 12px;
      box-shadow: 0px 5px 10px rgba(17,24,39,0.5);
      text-align: center;
    }
    .page-header .header-titles {
      padding: 5px 0 10px;
    }
    .page-header h1 {
      font-size: 30px;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: -0.3px;
    }
    .page-header h1 span {
      color: #2FA6A4;
    }
    .page-header .platform-tag {
      font-size: 20px;
      color: rgba(211, 218, 232, 0.55);
      margin-top: 4px;
    }

    /* ── Co-brand ── */
    /* ── Footer ── */
    .page-footer {
      background: #fff;
      border-top: 1px solid #E2E8F0;
      padding: 20px 32px;
      box-shadow: 0 2px 10px rgba(17,24,39,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .footer-label {
      font-size: 17px;
      font-weight: 600;
      color: rgba(17,24,39,0.45);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-right: 4px;
    }

    .page-footer .created-by {
    font-size: 17px;
    color: rgba(30, 47, 84, 0.644);
    white-space: nowrap;
  }

    .logo { display: flex; align-items: center; gap: 9px; }
    .logo-img { height: 39px; width: auto; display: block; flex-shrink: 0; object-fit: contain; }
    .brand-sep { width: 1px; height: 24px; background: #E2E8F0; flex-shrink: 0; }
    .partner-logo { height: 39px; width: auto; display: block; object-fit: contain; }

    /* ── Journey bar ── */
    .journey-bar {
      border-bottom: 0px solid #E2E8F0;
      padding-top: 30px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .journey-bar::before,
    .journey-bar::after {
      content: '';
      flex: 1;
      height: 1px;
    }
    .journey-bar::before {
      background: linear-gradient(to right, transparent, rgba(17,24,39,0.15));
    }
    .journey-bar::after {
      background: linear-gradient(to left, transparent, rgba(17,24,39,0.15));
    }
    .journey-bar-label {
      font-size: 15px;
      font-weight: 700;
      color: rgba(17,24,39,0.4);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      white-space: nowrap;
    }
    .journey-bar-arrow {
      font-size: 24px;
      color: rgba(17,24,39,0.25);
    }

    /* ── Lifecycle container ── */
    .lifecycle-wrap {
      padding: 30px 30px 50px 30px;
      overflow-x: auto;
    }

    /* ── Grid ── */
    .lifecycle-grid {
      display: grid;
      grid-template-columns: 100px repeat(6, 1fr);
      min-width: 960px;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }


    /* ── Stage header cells ── */
    .stage-header {
      background: #fff;
      border-bottom: 2px solid #E2E8F0;
      padding: 16px 14px 14px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .stage-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: #111827;
    }
    .stage-num {
      font-size: 14px;
      font-weight: 700;
      color: rgba(17,24,39,0.3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stage-name {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 5px;
    }
    .stage-tagline {
      font-size: 17px;
      color: rgba(17,24,39,0.45);
      line-height: 1.4;
    }

    /* ── Row label cells ── */
    .row-label {
      background: #fff;
      border-right: 1px solid #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
    }
    .row-label span {
      font-size: 14px;
      font-weight: 700;
      color: rgba(17,24,39,0.45);
      text-align: center;
      line-height: 1.35;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 0 10px;
    }
    .row-label.top-corner {
      background: #fff;
      border-bottom: 2px solid #E2E8F0;
    }

    /* ── Content cells ── */
    .stage-cell { padding: 12px 10px; }

    /* ── Feature cards ── */
    .w-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-left: 3px solid #E2E8F0;
      border-radius: 7px;
      padding: 11px 11px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.12s;
      user-select: none;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .w-card-body { flex: 1; min-width: 0; }
    .w-card:last-of-type { margin-bottom: 0; }
    .w-card:hover {
      border-color: #1F7F7D;
      box-shadow: 0 3px 10px rgba(47,166,164,0.12);
      transform: translateY(-1px);
    }
    .w-card.w-card-system {
      background: rgba(30,41,59,0.1);
      border: 1px solid rgba(30,41,59,0.18) !important;
      border-left: 3px solid rgba(30,41,59,0.28) !important;
      cursor: default;
    }
    .w-card.w-card-system .w-card-title { color: #334155; }
    .w-card.w-card-system:hover {
      transform: none;
      box-shadow: none !important;
      border-color: rgba(30,41,59,0.18) !important;
    }
    .w-card-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.35;
      color: #111827;
      margin-bottom: 5px;
    }
    .w-card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

    /* ── Badges ── */
    .badge {
      font-size: 14px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
    }
    .badge-apps  { background: rgba(116,39,116,0.08); color: #742774; border: 1px solid rgba(116,39,116,0.2); }
    .badge-apps img { width: 14px; height: 14px; margin-right: 4px; }
    .badge-pages { background: rgba(82,67,200,0.07); color: #5243C8; border: 1px solid rgba(82,67,200,0.2); }
    .badge-pages img { width: 14px; height: 14px; margin-right: 4px; }
    .badge-agent { background: rgba(214,50,160,0.07); color: #C0309A; border: 1px solid rgba(214,50,160,0.25); }
    .badge-d365  { background: rgba(16,100,200,0.07); color: #1064C8; border: 1px solid rgba(16,100,200,0.2); }
    .badge-d365 img { width: 14px; height: 14px; margin-right: 4px; }
    .badge-azure { background: rgba(0,120,212,0.07); color: #0078D4; border: 1px solid rgba(0,120,212,0.2); }
    .badge-azure img { width: 14px; height: 14px; margin-right: 4px; }
    .badge-async { background: #F1F5F9; color: rgba(17,24,39,0.65); }
    .badge-duration { font-size: 15px; color: rgba(17,24,39,0.5); font-weight: 500; }

    /* ── Card description ── */
    .w-card-desc {
      font-size: 12px;
      color: rgba(17,24,39,0.48);
      line-height: 1.4;
      overflow: hidden;
      max-height: 0;
      margin-top: 0;
      opacity: 0;
      transform: translateY(5px);
      transition:
        max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.3s ease,
        transform 0.3s ease,
        margin-top 0.3s ease;
    }
    .w-card:hover .w-card-desc,
    .common-feat-card:hover .w-card-desc,
    .agent-card:hover .w-card-desc {
      max-height: 20em;
      margin-top: 4px;
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Card count badge ── */
    .card-count {
      font-size: 14px;
      font-weight: 600;
      color: rgba(17,24,39,0.4);
      background: #E2E8F0;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
      letter-spacing: 0;
    }

    /* ── Card platform icon stack ── */
    .card-platform-icons {
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      flex-shrink: 0;
      padding-top: 1px;
    }
    .card-platform-icon {
      width: 16px;
      height: 16px;
      object-fit: contain;
      border-radius: 3px;
      opacity: 0.7;
      display: none;
    }

    /* ── Common Features card ── */
    .common-feat-card {
      border: 1px solid #E2E8F0;
      border-left: 3px solid #72D4CF;
      border-radius: 7px;
      padding: 11px 11px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      cursor: pointer;
      background: #fff;
      transition: box-shadow 0.15s, transform 0.12s;
      user-select: none;
    }
    .common-feat-card:hover {
      border-color: #4DBDB8;
      box-shadow: 0 3px 10px rgba(114,212,207,0.2);
      transform: translateY(-1px);
    }
    .common-feat-eyebrow {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #4DBDB8;
      margin-bottom: 3px;
    }
    .common-feat-card .w-card-title { margin-bottom: 0; }

    /* ── Common Features spanning cell ── */
    .common-feat-span {
      grid-column: 2 / -1;
      padding: 28px 10px 12px;
      display: flex;
      gap: 10px;
    }
    .common-feat-span .common-feat-card {
      flex: 1;
    }

    /* ── AI Agent card ── */
    .agent-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-left: 3px solid #7C3AED;
      border-radius: 7px;
      padding: 11px 11px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.12s;
      user-select: none;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .agent-card-body { flex: 1; min-width: 0; }
    .agent-card:last-of-type { margin-bottom: 0; }
    .agent-card:hover {
      border-color: #7C3AED;
      box-shadow: 0 3px 10px rgba(124,58,237,0.12);
      transform: translateY(-1px);
    }
    .agent-eyebrow {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #4338CA;
      margin-bottom: 3px;
    }
    .agent-card .w-card-title { margin-bottom: 0; font-size: 12px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .agent-card-header { display: flex; align-items: flex-start; gap: 5px; }
    .agent-icon { width: 14px; height: 14px; object-fit: contain; flex-shrink: 0; margin-top: 1px; }
    .stage-cell.agents-cell { display: flex; flex-wrap: wrap; gap: 5px; align-content: flex-start; }
    .stage-cell.agents-cell .agent-card { flex: 1 1 calc(50% - 3px); min-width: 0; margin-bottom: 0; }


    /* ── Integration layer strip ── */
    .integration-row {
      grid-column: 1 / -1;
      border-top: 2px solid #334155;
      background: rgba(30,41,59,0.04);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      cursor: pointer;
      transition: background 0.15s;
    }
    .integration-row:hover { background: rgba(30,41,59,0.08); }
    .integration-label { flex-shrink: 0; min-width: 160px; }
    .integration-eyebrow {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #334155;
      margin-bottom: 3px;
    }
    .integration-title {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
    }
    .integration-desc {
      font-size: 16px;
      color: rgba(17,24,39,0.65);
      line-height: 1.55;
      flex: 1;
      min-width: 220px;
    }
    .integration-tags { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .integration-tag {
      font-size: 15px;
      font-weight: 600;
      color: #334155;
      background: rgba(30,41,59,0.1);
      border: 1px solid rgba(30,41,59,0.18);
      padding: 3px 9px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── Panel overlay ── */
    .panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.2);
      z-index: 100;
      backdrop-filter: blur(2px);
    }
    .panel-overlay.active { display: block; }

    /* ── Detail panel ── */
    .detail-panel {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -62%);
      opacity: 0;
      pointer-events: none;
      width: 80vw;
      height: 80vh;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.16);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s;
    }
    .detail-panel.open {
      transform: translate(-50%, -50%);
      opacity: 1;
      pointer-events: auto;
    }

    .panel-header {
      padding: 22px 22px 16px;
      border-bottom: 1px solid #E2E8F0;
      flex-shrink: 0;
      position: relative;
    }
    .panel-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 30px;
      height: 30px;
      border: none;
      background: #F1F5F9;
      border-radius: 6px;
      cursor: pointer;
      font-size: 21px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(17,24,39,0.55);
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .panel-close:hover { background: #111827; color: #fff; }

    .panel-eyebrow {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(17,24,39,0.5);
      margin-bottom: 5px;
    }
    .panel-title {
      font-size: 29px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.25;
      padding-right: 36px;
      margin-bottom: 8px;
      color: #111827;
    }
    .panel-meta { display: flex; gap: 7px; align-items: center; }

    .panel-body {
      padding: 18px 22px 32px;
      overflow-y: auto;
      flex: 1;
    }
    .panel-desc {
      font-size: 20px;
      line-height: 1.65;
      color: rgba(17,24,39,0.72);
      margin-bottom: 14px;
    }
    .panel-note {
      background: #fffbee;
      border: 1px solid #edd;
      border-left: 3px solid #c8a000;
      border-radius: 0 6px 6px 0;
      padding: 10px 14px;
      font-size: 18px;
      color: #554400;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .panel-note.green {
      background: rgba(221,242,241,0.4);
      border-color: rgba(47,166,164,0.25);
      border-left-color: #2FA6A4;
      color: #1F5F5E;
    }
    .panel-section { margin-bottom: 16px; }
    .panel-section-title {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: rgba(17,24,39,0.5);
      margin-bottom: 7px;
      padding-bottom: 5px;
      border-bottom: 1px solid #E2E8F0;
    }
    .panel-subsection {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      margin: 12px 0 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .panel-list { list-style: none; padding: 0; }
    .panel-list li {
      font-size: 16px;
      color: rgba(17,24,39,0.72);
      padding: 3px 0 3px 16px;
      position: relative;
      line-height: 1.55;
    }
    .panel-list li::before {
      content: '';
      position: absolute;
      left: 3px;
      top: 0.6em;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(17,24,39,0.72);
    }
    .panel-list li strong { color: #111827; font-weight: 600; }

    /* ── Tech legend ── */
    .tech-legend {
      background: #fff;
      border-top: 1px solid #E2E8F0;
      border-bottom: 1px solid #E2E8F0;
      padding: 16px 32px;
      margin-bottom: 30px;
    }
    .tech-legend-inner {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .tech-legend-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: rgba(17,24,39,0.4);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tech-legend-sep {
      width: 1px;
      height: 20px;
      background: #E2E8F0;
      flex-shrink: 0;
    }
    .tech-legend-items {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px 5px 7px;
      border-radius: 20px;
      border: 1.5px solid #E2E8F0;
      background: #F8FAFC;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: rgba(17,24,39,0.5);
      transition: border-color 0.15s, background 0.15s, color 0.15s, opacity 0.15s;
      user-select: none;
      position: relative;
    }
    .legend-item img {
      width: 16px;
      height: 16px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .legend-item .legend-check {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 9px;
      opacity: 0.6;
    }
    /* Active states per platform */
    .legend-item[data-toggle="apps"].active    { background: rgba(116,39,116,0.07); border-color: rgba(116,39,116,0.3); color: #742774; }
    .legend-item[data-toggle="pages"].active   { background: rgba(82,67,200,0.07);  border-color: rgba(82,67,200,0.3);  color: #5243C8; }
    .legend-item[data-toggle="d365"].active    { background: rgba(16,100,200,0.07); border-color: rgba(16,100,200,0.3); color: #1064C8; }
    .legend-item[data-toggle="agent"].active   { background: rgba(214,50,160,0.07); border-color: rgba(214,50,160,0.3); color: #C0309A; }
    .legend-item[data-toggle="azure"].active   { background: rgba(0,120,212,0.07);  border-color: rgba(0,120,212,0.3);  color: #0078D4; }
    .legend-item.active .legend-check          { opacity: 1; }
    /* Inactive: dimmed */
    .legend-item:not(.active) {
      opacity: 0.5;
    }
    .legend-item:not(.active) img { filter: grayscale(1); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .page-header { padding: 0 20px; }
      .lifecycle-wrap { padding: 16px 10px 32px; }
      .detail-panel { width: 96vw; height: 90vh; }
      .tech-legend { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<header class="page-header">
  <div class="header-titles">
    <h1>StudentFlow XP</h1>
    <p class="platform-tag">Modern Student Lifecycle Platform to manage the entire Student Journey</p>
  </div>
</header>

<div class="journey-bar">
  <span class="journey-bar-label">➝  Student Lifecycle Journey  ➝</span>
</div>

<div class="lifecycle-wrap">
  <div class="lifecycle-grid" id="lifecycleGrid"></div>
</div>

<div class="panel-overlay" id="panelOverlay"></div>

<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <button class="panel-close" id="panelClose">&#x2715;</button>
    <div class="panel-eyebrow" id="panelEyebrow"></div>
    <div class="panel-title" id="panelTitle"></div>
    <div class="panel-meta" id="panelMeta"></div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

function platformBadge(platform) {
  const appsIcon  = '<img src="https://www.microsoft.com/content/dam/microsoft/final/en-us/microsoft-product-and-services/power-platform/Microsoft_Power_Platform_Icons_PowerApps.svg" alt="">';
  const pagesIcon = '<img src="https://www.microsoft.com/content/dam/microsoft/final/en-us/microsoft-brand/icons/PP-Hero_Icon_PowerPages.svg" alt="">';
  const d365Icon  = '<img src="https://rapidcircle.com/wp-content/uploads/2023/11/Microsoft-Dynamics-Sales-Marketing-and-Service-280x300.png" alt="">';
  const map = {
    apps:  { cls: 'badge-apps',  html: appsIcon + 'Power Apps' },
    pages: { cls: 'badge-pages', html: pagesIcon + 'Power Pages' },
    agent: { cls: 'badge-agent', html: '<img src="CopilotStudioLogo.png" alt="" style="width:12px;height:12px;vertical-align:middle;margin-right:4px;margin-top:-1px;">Copilot Studio' },
    d365:  { cls: 'badge-d365',  html: d365Icon + 'Dynamics 365' },
    azure: { cls: 'badge-azure', html: 'Azure Foundry' }
  };
  return map[platform] || { cls: 'badge-pages', html: esc(platform) };
}

function shortDesc(str) {
  if (!str) return '';
  const dot = str.indexOf('.');
  const snippet = dot > 0 && dot < 90 ? str.slice(0, dot + 1) : str.slice(0, 80).trimEnd() + '…';
  return snippet;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Card icon stack helper ────────────────────────────────────────────────────

function cardIconStack(platforms) {
  const iconSrc = {
    apps:  'https://www.microsoft.com/content/dam/microsoft/final/en-us/microsoft-product-and-services/power-platform/Microsoft_Power_Platform_Icons_PowerApps.svg',
    pages: 'https://www.microsoft.com/content/dam/microsoft/final/en-us/microsoft-brand/icons/PP-Hero_Icon_PowerPages.svg',
    d365:  'https://rapidcircle.com/wp-content/uploads/2023/11/Microsoft-Dynamics-Sales-Marketing-and-Service-280x300.png',
    agent: 'CopilotStudioLogo.png',
    azure: 'https://ai.azure.com/assets/aistudio-af17733a.svg',
  };
  const imgs = platforms
    .filter(p => p && iconSrc[p])
    .map(p => `<img src="${iconSrc[p]}" alt="" class="card-platform-icon" data-platform="${p}">`);
  return imgs.length ? `<div class="card-platform-icons">${imgs.join('')}</div>` : '';
}

// ── Render grid ───────────────────────────────────────────────────────────────

function injectStageStyles() {
  let css = '';
  STAGES.forEach(s => {
    const c = COLORS[s.id];
    if (!c) return;
    css += `
      .stage-header[data-sid="${s.id}"]::before { background: ${c.pill}; }
      [data-sid="${s.id}"] .w-card { border-left-color: ${c.pill}; }
      [data-sid="${s.id}"] .w-card:hover { border-color: ${c.pill}; box-shadow: 0 3px 10px ${c.shadow}; }
    `;
  });
  const el = document.createElement('style');
  el.textContent = css;
  document.head.appendChild(el);
}

function renderGrid() {
  injectStageStyles();
  let html = '';

  // Header row
  html += `<div class="row-label top-corner"></div>`;
  STAGES.forEach((s, i) => {
    const num = String(i + 1).padStart(2, '0');
    html += `
      <div class="stage-header" data-sid="${s.id}">
        <div class="stage-num">${num}</div>
        <div class="stage-name">${esc(s.title)}</div>
        <div class="stage-tagline">${esc(s.tagline)}</div>
      </div>`;
  });

  // Features row
  html += `<div class="row-label"><span>Features</span></div>`;
  STAGES.forEach(s => {
    let cells = '';
    s.features.forEach(f => {
      const systemClass = f.system ? ' w-card-system' : '';
      const iconPlatforms = f.system ? [] : [f.platform, ...(f.platform && f.platform !== 'apps' ? ['apps'] : [])].filter(Boolean);
      cells += `
        <div class="w-card${systemClass}" data-stage="${s.id}" data-feature="${esc(f.title)}" role="button" tabindex="0">
          <div class="w-card-body">
            <div class="w-card-title">${esc(f.title)}</div>
            ${f.desc ? `<div class="w-card-desc">${esc(f.desc)}</div>` : ''}
          </div>
          ${cardIconStack(iconPlatforms)}
        </div>`;
    });
    html += `<div class="stage-cell" data-sid="${s.id}">${cells}</div>`;
  });

  // Common Features row
  html += `<div class="row-label" style="padding-top:28px"><span>Common Features</span></div>`;
  html += `<div class="common-feat-span">`;
  COMMON_FEATURES.forEach(f => {
    const cfPlatforms = [...(f.platform ? [f.platform] : []), ...((!f.platform || f.platform !== 'apps') ? ['apps'] : [])];
    html += `
      <div class="common-feat-card" data-common="${esc(f.title)}" role="button" tabindex="0">
        <div class="w-card-body">
          <div class="common-feat-eyebrow">Common Feature</div>
          <div class="w-card-title">${esc(f.title)}</div>
          ${f.desc ? `<div class="w-card-desc">${esc(f.desc)}</div>` : ''}
        </div>
        ${cardIconStack(cfPlatforms)}
      </div>`;
  });
  html += `</div>`;

  // AI Agents row
  html += `<div class="row-label" style="padding-top:28px"><span>AI Agents</span></div>`;
  STAGES.forEach(s => {
    let cells = '';
    (s.aiAgents || []).forEach(a => {
      const agentPlatforms = a.extraBadge === 'azure' ? ['agent', 'azure'] : ['agent'];
      cells += `
        <div class="agent-card" data-stage="${s.id}" data-agent="${esc(a.title)}" title="${esc(a.title)}" role="button" tabindex="0">
          <div class="agent-card-body">
            <div class="agent-card-header"><img src="AIAgent.png" alt="" class="agent-icon"><div class="w-card-title">${esc(a.title)}</div></div>
            ${a.desc ? `<div class="w-card-desc">${esc(a.desc)}</div>` : ''}
          </div>
          ${cardIconStack(agentPlatforms)}
        </div>`;
    });
    html += `<div class="stage-cell agents-cell" style="padding-top:28px" data-sid="${s.id}">${cells}</div>`;
  });

  // Integration layer strip
  html += `
    <div class="integration-row" id="integrationRow" role="button" tabindex="0">
      <div class="integration-label">
        <div class="integration-eyebrow">Integration Layer</div>
        <div class="integration-title">Platform Integrations</div>
      </div>
      <div class="integration-desc">Connects with your existing university and government systems. The accelerator integrates with your Student Management System, government portals, and specialist platforms via standard APIs and connectors.</div>
      <div class="integration-tags">
        <span class="integration-tag">Student Management System (StudentOne, PeopleSoft, etc.)</span>
        <span class="integration-tag">StudyLink</span>
        <span class="integration-tag">Placement System (InPlace, Sonia, etc.)</span>
        <span class="integration-tag">VEVO</span>
        <span class="integration-tag">USI</span>
        <span class="integration-tag">LMS</span>
        <span class="integration-tag">Finance System</span>
        <span class="integration-tag">Identity Provider</span>
      </div>
    </div>`;

  document.getElementById('lifecycleGrid').innerHTML = html;

  // Bind events
  document.querySelectorAll('[data-feature]').forEach(el => {
    el.addEventListener('click', () => openFeature(el.dataset.stage, el.dataset.feature));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openFeature(el.dataset.stage, el.dataset.feature); });
  });
  document.querySelectorAll('[data-common]').forEach(el => {
    el.addEventListener('click', () => openCommonFeat(el.dataset.common));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openCommonFeat(el.dataset.common); });
  });
  document.querySelectorAll('[data-agent]').forEach(el => {
    el.addEventListener('click', () => openAgent(el.dataset.stage, el.dataset.agent));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openAgent(el.dataset.stage, el.dataset.agent); });
  });
  document.getElementById('integrationRow').addEventListener('click', openIntegration);
  document.getElementById('integrationRow').addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openIntegration(); });
}

// ── Panel renderers ───────────────────────────────────────────────────────────

function renderSections(sections) {
  let html = '';
  sections.forEach(s => {
    if (s.head) html += `<p class="panel-subsection">${esc(s.head)}</p>`;
    if (s.items && s.items.length) {
      html += `<ul class="panel-list">${s.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`;
    }
  });
  return html;
}

function openFeature(stageId, title) {
  const stage = STAGES.find(s => s.id === stageId);
  const f = stage.features.find(x => x.title === title);
  if (!f) return;
  const pb = platformBadge(f.platform);
  const appsBadge = platformBadge('apps');
  const extraApps = f.platform !== 'apps' ? `<span class="badge ${appsBadge.cls}">${appsBadge.html}</span>` : '';

  document.getElementById('panelEyebrow').textContent = stage.title;
  document.getElementById('panelTitle').textContent = f.title;
  document.getElementById('panelMeta').innerHTML = `<span class="badge ${pb.cls}">${pb.html}</span>${extraApps}`;

  let body = `<p class="panel-desc">${esc(f.desc)}</p>`;
  body += renderSections(f.sections);
  document.getElementById('panelBody').innerHTML = body;
  openPanel();
}

function openStudentExp(stageId) {
  const stage = STAGES.find(s => s.id === stageId);
  const se = stage.studentExperiences;

  document.getElementById('panelEyebrow').textContent = stage.title + ' \u00b7 Student Experience';
  document.getElementById('panelTitle').textContent = se.title;
  document.getElementById('panelMeta').innerHTML = `<span class="badge badge-async">Self-service</span>`;

  let body = `<p class="panel-desc">${esc(se.desc)}</p>`;
  body += `<ul class="panel-list">${se.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`;
  document.getElementById('panelBody').innerHTML = body;
  openPanel();
}

function openStaffExp(stageId) {
  const stage = STAGES.find(s => s.id === stageId);
  const se = stage.staffExperiences;

  document.getElementById('panelEyebrow').textContent = stage.title + ' \u00b7 Staff Experience';
  document.getElementById('panelTitle').textContent = se.title;
  document.getElementById('panelMeta').innerHTML = `<span class="badge badge-apps">${platformBadge('apps').html}</span>`;

  let body = `<p class="panel-desc">${esc(se.desc)}</p>`;
  body += `<ul class="panel-list">${se.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`;
  document.getElementById('panelBody').innerHTML = body;
  openPanel();
}

function openAgent(stageId, agentTitle) {
  const stage = STAGES.find(s => s.id === stageId);
  const a = (stage.aiAgents || []).find(x => x.title === agentTitle);
  if (!a) return;

  document.getElementById('panelEyebrow').textContent = stage.title + ' \u00b7 AI Agent';
  document.getElementById('panelTitle').textContent = a.title;
  const extraBadgeHtml = a.extraBadge === 'azure'
    ? `<span class="badge badge-azure"><img src="https://ai.azure.com/assets/aistudio-af17733a.svg" alt="" style="width:12px;height:12px;vertical-align:middle;margin-right:4px;margin-top:-1px;">Azure Foundry</span>`
    : '';
  document.getElementById('panelMeta').innerHTML = `<span class="badge badge-agent"><img src="CopilotStudioLogo.png" alt="" style="width:12px;height:12px;vertical-align:middle;margin-right:4px;margin-top:-1px;">Copilot Studio</span>${extraBadgeHtml}`;

  let body = `<p class="panel-desc">${esc(a.desc)}</p>`;
  body += renderSections(a.sections);
  document.getElementById('panelBody').innerHTML = body;
  openPanel();
}

function openCommonFeat(title) {
  const f = COMMON_FEATURES.find(x => x.title === title);
  if (!f) return;
  document.getElementById('panelEyebrow').textContent = 'Common Feature · All Stages';
  document.getElementById('panelTitle').textContent = f.title;
  const cpb = f.platform ? platformBadge(f.platform) : null;
  const cappsB = platformBadge('apps');
  const cextraApps = f.platform !== 'apps' ? `<span class="badge ${cappsB.cls}">${cappsB.html}</span>` : '';
  document.getElementById('panelMeta').innerHTML = cpb
    ? `<span class="badge ${cpb.cls}">${cpb.html}</span>${cextraApps}`
    : cextraApps;
  let body = `<p class="panel-desc">${esc(f.desc)}</p>`;
  body += renderSections(f.sections);
  document.getElementById('panelBody').innerHTML = body;
  openPanel();
}


function openIntegration() {
  document.getElementById('panelEyebrow').textContent = 'Integration Layer';
  document.getElementById('panelTitle').textContent = 'Platform Integrations';
  document.getElementById('panelMeta').innerHTML = `<span class="badge badge-async">All Stages</span>`;

  const body = `
    <p class="panel-desc">The accelerator connects with your existing university and government systems via standard APIs and Microsoft Power Platform connectors — no rip and replace required. Integrations are configurable and can be phased to match your implementation roadmap.</p>
    <div class="panel-section">
      <p class="panel-section-title">Core system integrations</p>
      <ul class="panel-list">
        <li><strong>Student Management System</strong> — bi-directional sync of student records, enrolments, academic results, and progression data</li>
        <li><strong>StudyLink</strong> — student loan and allowance eligibility verification and enrolment reporting</li>
        <li><strong>Placement System</strong> — work-integrated learning placement data, employer records, and completion tracking</li>
        <li><strong>VeVo</strong> — visa entitlement verification for international students at enrolment and key checkpoints</li>
        <li><strong>USI (Unique Student Identifier)</strong> — USI verification and reporting for compliance with national training requirements</li>
        <li><strong>LMS (Learning Management System)</strong> — course content, assessment submissions, and attendance data</li>
        <li><strong>Finance System</strong> — fee invoicing, payment status, scholarship disbursements, and financial holds</li>
        <li><strong>Identity Provider</strong> — single sign-on via Azure AD / Entra ID for staff and students</li>
      </ul>
    </div>
    <div class="panel-section">
      <p class="panel-section-title">Integration approach</p>
      <ul class="panel-list">
        <li>Microsoft Power Platform connectors for out-of-the-box integrations with 1,000+ systems</li>
        <li>Azure Integration Services (Logic Apps, API Management) for complex or custom integrations</li>
        <li>Dataverse virtual tables for real-time data access without duplication</li>
        <li>Phased integration roadmap — start with priority systems and expand over time</li>
      </ul>
    </div>`;

  document.getElementById('panelBody').innerHTML = body;
  openPanel();
}

function openPanel() {
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('active');
  document.getElementById('panelBody').scrollTop = 0;
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('active');
}

// ── Event listeners ───────────────────────────────────────────────────────────

document.getElementById('panelOverlay').addEventListener('click', closePanel);
document.getElementById('panelClose').addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ── Legend toggles ────────────────────────────────────────────────────────────

function initLegendToggles() {
  document.querySelectorAll('.legend-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const platform = btn.dataset.toggle;
      const isNowActive = !btn.classList.contains('active');
      btn.classList.toggle('active');
      document.querySelectorAll(`.card-platform-icon[data-platform="${platform}"]`).forEach(icon => {
        icon.style.display = isNowActive ? 'block' : 'none';
      });
    });
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────

renderGrid();
document.addEventListener('DOMContentLoaded', initLegendToggles);
</script>
