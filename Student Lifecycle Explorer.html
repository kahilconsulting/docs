<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Lifecycle — AppRising</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F6F8FB;
      color: #111827;
      min-height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      background: #fff;
      border-bottom: 1px solid #E2E8F0;
      padding: 28px 40px 24px;
    }
    .page-header h1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
      color: #111827;
    }
    .page-header .platform-tag {
      font-size: 12px;
      color: rgba(17,24,39,0.55);
      margin-top: 4px;
    }

    /* ── Co-brand ── */
    /* ── Footer ── */
    .page-footer {
      background: #fff;
      border-top: 1px solid #E2E8F0;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .footer-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(17,24,39,0.45);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-right: 4px;
    }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo-img { height: 34px; width: auto; display: block; flex-shrink: 0; }
    .brand-sep { width: 1px; height: 26px; background: #E2E8F0; flex-shrink: 0; }
    .partner-logo { height: 30px; width: auto; display: block; }

    /* ── Lifecycle container ── */
    .lifecycle-wrap {
      padding: 28px 24px 48px;
      overflow-x: auto;
    }

    /* ── Grid ── */
    .lifecycle-grid {
      display: grid;
      grid-template-columns: 76px repeat(6, 1fr);
      min-width: 960px;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    /* ── Row label cells ── */
    .row-label {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
    }
    .row-label span {
      font-size: 11px;
      font-weight: 600;
      color: #111827;
      text-align: center;
      line-height: 1.35;
    }
    .row-label.top-corner {
      background: #fff;
      border-bottom: 2px solid #E2E8F0;
    }

    /* ── Stage header cells ── */
    .stage-header {
      padding: 14px 10px;
      border-bottom: 2px solid #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }
    .stage-pill {
      background: #111827;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 999px;
      text-align: center;
      line-height: 1.3;
      letter-spacing: 0.1px;
    }

    /* ── Content cells ── */
    .stage-cell { padding: 12px 10px; }

    /* ── Key activity cards ── */
    .w-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 7px;
      padding: 9px 11px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
      user-select: none;
    }
    .w-card:last-of-type { margin-bottom: 0; }
    .w-card:hover {
      border-color: #1F7F7D;
      box-shadow: 0 3px 10px rgba(47,166,164,0.12);
      transform: translateY(-1px);
    }
    .w-card-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      color: #111827;
      margin-bottom: 5px;
    }
    .w-card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

    /* ── Badges ── */
    .badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-apps  { background: #111827; color: #fff; }
    .badge-pages { background: #F1F5F9; color: rgba(17,24,39,0.65); }
    .badge-agent { background: #EEF2FF; color: #4338CA; }
    .badge-async { background: #F1F5F9; color: rgba(17,24,39,0.65); }
    .badge-duration { font-size: 10px; color: rgba(17,24,39,0.5); font-weight: 500; }

    /* ── Card count badge ── */
    .card-count {
      font-size: 9px;
      font-weight: 600;
      color: rgba(17,24,39,0.4);
      background: #E2E8F0;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
      letter-spacing: 0;
    }

    /* ── Student actions card ── */
    .student-card {
      border: 1.5px dashed rgba(47,166,164,0.45);
      border-radius: 7px;
      padding: 9px 11px;
      cursor: pointer;
      background: rgba(221,242,241,0.5);
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .student-card:hover {
      border-color: #2FA6A4;
      background: rgba(47,166,164,0.1);
    }
    .student-eyebrow {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #2FA6A4;
      margin-bottom: 3px;
    }
    .student-card .w-card-title { margin-bottom: 0; }

    /* ── Staff prepare card ── */
    .staff-card {
      border: 1.5px dashed #c8cdd8;
      border-radius: 7px;
      padding: 9px 11px;
      cursor: pointer;
      background: #F6F8FB;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .staff-card:hover {
      border-color: #1F7F7D;
      background: rgba(47,166,164,0.06);
    }
    .staff-eyebrow {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(17,24,39,0.5);
      margin-bottom: 3px;
    }
    .staff-card .w-card-title { margin-bottom: 0; }

    /* ── Outcome card ── */
    .outcome-card {
      background: rgba(47,166,164,0.06);
      border: 1px solid rgba(47,166,164,0.28);
      border-radius: 7px;
      padding: 9px 11px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .outcome-card:hover {
      border-color: #2FA6A4;
      background: rgba(47,166,164,0.12);
    }
    .outcome-eyebrow {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #2FA6A4;
      margin-bottom: 3px;
    }
    .outcome-card .w-card-title { margin-bottom: 0; }

    /* ── Student Support strip ── */
    .support-row {
      grid-column: 1 / -1;
      border-top: 2px solid #2FA6A4;
      background: rgba(47,166,164,0.04);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      cursor: pointer;
      transition: background 0.15s;
    }
    .support-row:hover { background: rgba(47,166,164,0.09); }
    .support-label { flex-shrink: 0; min-width: 160px; }
    .support-eyebrow {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #2FA6A4;
      margin-bottom: 3px;
    }
    .support-title {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
    }
    .support-desc {
      font-size: 12px;
      color: rgba(17,24,39,0.65);
      line-height: 1.55;
      flex: 1;
      min-width: 220px;
    }
    .support-tags { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .support-tag {
      font-size: 10px;
      font-weight: 600;
      color: #1F7F7D;
      background: rgba(47,166,164,0.10);
      border: 1px solid rgba(47,166,164,0.25);
      padding: 3px 9px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── Panel overlay ── */
    .panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.2);
      z-index: 100;
      backdrop-filter: blur(2px);
    }
    .panel-overlay.active { display: block; }

    /* ── Detail panel ── */
    .detail-panel {
      position: fixed;
      top: 0;
      right: -540px;
      width: 500px;
      max-width: 96vw;
      height: 100vh;
      background: #fff;
      box-shadow: -4px 0 32px rgba(0,0,0,0.10);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transition: right 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .detail-panel.open { right: 0; }

    .panel-header {
      padding: 22px 22px 16px;
      border-bottom: 1px solid #E2E8F0;
      flex-shrink: 0;
      position: relative;
    }
    .panel-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 30px;
      height: 30px;
      border: none;
      background: #F1F5F9;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(17,24,39,0.55);
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .panel-close:hover { background: #111827; color: #fff; }

    .panel-eyebrow {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(17,24,39,0.5);
      margin-bottom: 5px;
    }
    .panel-title {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.25;
      padding-right: 36px;
      margin-bottom: 8px;
      color: #111827;
    }
    .panel-meta { display: flex; gap: 7px; align-items: center; }

    .panel-body {
      padding: 18px 22px 32px;
      overflow-y: auto;
      flex: 1;
    }
    .panel-desc {
      font-size: 14px;
      line-height: 1.65;
      color: rgba(17,24,39,0.72);
      margin-bottom: 14px;
    }
    .panel-note {
      background: #fffbee;
      border: 1px solid #edd;
      border-left: 3px solid #c8a000;
      border-radius: 0 6px 6px 0;
      padding: 10px 14px;
      font-size: 12px;
      color: #554400;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .panel-note.green {
      background: rgba(221,242,241,0.4);
      border-color: rgba(47,166,164,0.25);
      border-left-color: #2FA6A4;
      color: #1F5F5E;
    }
    .panel-section { margin-bottom: 16px; }
    .panel-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: rgba(17,24,39,0.5);
      margin-bottom: 7px;
      padding-bottom: 5px;
      border-bottom: 1px solid #E2E8F0;
    }
    .panel-subsection {
      font-size: 12px;
      font-weight: 700;
      color: #111827;
      margin: 12px 0 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .panel-list { list-style: none; padding: 0; }
    .panel-list li {
      font-size: 13px;
      color: rgba(17,24,39,0.72);
      padding: 3px 0 3px 16px;
      position: relative;
      line-height: 1.55;
    }
    .panel-list li::before {
      content: '';
      position: absolute;
      left: 3px;
      top: 9px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2FA6A4;
    }
    .panel-list li strong { color: #111827; font-weight: 600; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .page-header { padding: 20px 16px 18px; }
      .lifecycle-wrap { padding: 16px 10px 32px; }
      .detail-panel { width: 100vw; right: -100vw; }
    }
  </style>
</head>

    <div class="panel-meta" id="panelMeta"></div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

// ── Helpers ───────────────────────────────────────────────────────────────────

function platformBadge(platform) {
  const map = {
    apps:  { cls: 'badge-apps',  label: 'Power Apps' },
    pages: { cls: 'badge-pages', label: 'Power Pages' },
    agent: { cls: 'badge-agent', label: 'Copilot Agent' }
  };
  return map[platform] || { cls: 'badge-pages', label: platform };
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Render grid ───────────────────────────────────────────────────────────────

function injectStageStyles() {
  let css = '';
  STAGES.forEach(s => {
    const c = COLORS[s.id];
    if (!c) return;
    css += `
      .stage-header[data-sid="${s.id}"] .stage-pill { background: ${c.pill}; }
      [data-sid="${s.id}"] .w-card { background: ${c.cardBg}; border-color: ${c.cardBorder}; }
      [data-sid="${s.id}"] .w-card:hover { border-color: ${c.hover}; box-shadow: 0 3px 10px ${c.shadow}; }
    `;
  });
  const el = document.createElement('style');
  el.textContent = css;
  document.head.appendChild(el);
}

function renderGrid() {
  injectStageStyles();
  let html = '';

  // Header row
  html += `<div class="row-label top-corner"></div>`;
  STAGES.forEach(s => {
    html += `<div class="stage-header" data-sid="${s.id}"><div class="stage-pill">${esc(s.title)}</div></div>`;
  });

  // Key activities row
  html += `<div class="row-label"><span>Key activities</span></div>`;
  STAGES.forEach(s => {
    let cells = '';
    s.activities.forEach(a => {
      const pb = platformBadge(a.platform);
      cells += `
        <div class="w-card" data-stage="${s.id}" data-activity="${esc(a.title)}" role="button" tabindex="0">
          <div class="w-card-title">${esc(a.title)}</div>
          <div class="w-card-meta">
            <span class="badge ${pb.cls}">${esc(pb.label)}</span>
            <span class="badge-duration">${esc(a.type)}</span>
          </div>
        </div>`;
    });
    html += `<div class="stage-cell" data-sid="${s.id}">${cells}</div>`;
  });

  // Student actions row
  html += `<div class="row-label"><span>Student actions</span></div>`;
  STAGES.forEach(s => {
    const cell = `
      <div class="student-card" data-stage="${s.id}" data-student="true" role="button" tabindex="0">
        <div class="student-eyebrow">Student actions</div>
        <div class="w-card-title">${esc(s.studentActions.title)}<span class="card-count">${s.studentActions.items.length}</span></div>
      </div>`;
    html += `<div class="stage-cell">${cell}</div>`;
  });

  // Staff prepare row
  html += `<div class="row-label"><span>Staff prepare</span></div>`;
  STAGES.forEach(s => {
    const cell = `
      <div class="staff-card" data-stage="${s.id}" data-staff="true" role="button" tabindex="0">
        <div class="staff-eyebrow">Staff prepare</div>
        <div class="w-card-title">${esc(s.staffPrepareSummary)}<span class="card-count">${s.staffPrepare.length}</span></div>
      </div>`;
    html += `<div class="stage-cell">${cell}</div>`;
  });

  // Outcomes row
  html += `<div class="row-label"><span>Outcomes</span></div>`;
  STAGES.forEach(s => {
    const cell = `
      <div class="outcome-card" data-stage="${s.id}" data-outcomes="true" role="button" tabindex="0">
        <div class="outcome-eyebrow">Outcomes</div>
        <div class="w-card-title">${esc(s.outcomeSummary)}<span class="card-count">${s.outcomes.length}</span></div>
      </div>`;
    html += `<div class="stage-cell">${cell}</div>`;
  });

  // Student Support strip
  html += `
    <div class="support-row" id="supportRow" role="button" tabindex="0">
      <div class="support-label">
        <div class="support-eyebrow">Continuous layer</div>
        <div class="support-title">Student Support</div>
      </div>
      <div class="support-desc">A consistent support layer active from first enquiry through to alumni — covering wellbeing, mental health, financial assistance, disability services, and student advocacy across every stage of the lifecycle.</div>
      <div class="support-tags">
        <span class="support-tag">Wellbeing</span>
        <span class="support-tag">Mental Health</span>
        <span class="support-tag">Financial Aid</span>
        <span class="support-tag">Disability Services</span>
        <span class="support-tag">Student Advocacy</span>
        <span class="support-tag">Crisis Support</span>
        <span class="support-tag">Complaints</span>
        <span class="support-tag">Appeals</span>
      </div>
    </div>`;

  document.getElementById('lifecycleGrid').innerHTML = html;

  // Bind events
  document.querySelectorAll('[data-activity]').forEach(el => {
    el.addEventListener('click', () => openActivity(el.dataset.stage, el.dataset.activity));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openActivity(el.dataset.stage, el.dataset.activity); });
  });
  document.querySelectorAll('[data-student]').forEach(el => {
    el.addEventListener('click', () => openStudentActions(el.dataset.stage));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openStudentActions(el.dataset.stage); });
  });
  document.querySelectorAll('[data-staff]').forEach(el => {
    el.addEventListener('click', () => openStaffPrepare(el.dataset.stage));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openStaffPrepare(el.dataset.stage); });
  });
  document.querySelectorAll('[data-outcomes]').forEach(el => {
    el.addEventListener('click', () => openOutcomes(el.dataset.stage));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openOutcomes(el.dataset.stage); });
  });
  document.getElementById('supportRow').addEventListener('click', openSupport);
  document.getElementById('supportRow').addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openSupport(); });
}

// ── Panel renderers ───────────────────────────────────────────────────────────

function renderSections(sections) {
  let html = '';
  sections.forEach(s => {
    if (s.head) html += `<p class="panel-subsection">${esc(s.head)}</p>`;
    if (s.items && s.items.length) {
      html += `<ul class="panel-list">${s.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`;
    }
  });
  return html;
}

function openActivity(stageId, title) {
  const stage = STAGES.find(s => s.id === stageId);
  const a = stage.activities.find(x => x.title === title);
  if (!a) return;
  const pb = platformBadge(a.platform);

  document.getElementById('panelEyebrow').textContent = stage.title;
  document.getElementById('panelTitle').textContent = a.title;
  document.getElementById('panelMeta').innerHTML = `
    <span class="badge ${pb.cls}">${esc(pb.label)}</span>
    <span class="badge-duration">${esc(a.type)}</span>`;

  let body = `<p class="panel-desc">${esc(a.desc)}</p>`;
  body += renderSections(a.sections);
  document.getElementById('panelBody').innerHTML = body;
  openPanel();
}

function openStudentActions(stageId) {
  const stage = STAGES.find(s => s.id === stageId);
  const sa = stage.studentActions;

  document.getElementById('panelEyebrow').textContent = stage.title + ' \u00b7 Student Actions';
  document.getElementById('panelTitle').textContent = sa.title;
  document.getElementById('panelMeta').innerHTML = `<span class="badge badge-async">Self-service</span>`;

  let body = `<p class="panel-desc">${esc(sa.desc)}</p>`;
  body += `<ul class="panel-list">${sa.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`;
  document.getElementById('panelBody').innerHTML = body;
  openPanel();
}

function openSupport() {

  document.getElementById('panelMeta').innerHTML = `<span class="badge badge-async">Continuous</span>`;

    <p class="panel-desc">A consistent support layer active from first enquiry through to alumni — covering wellbeing, mental health, financial assistance, disability services, and student advocacy across every stage of the lifecycle.</p>
    <div class="panel-note green">&#x1f4a1; Student Support is a running thread, not a stage activity. It operates across the whole lifecycle, ensuring no student falls through the gap regardless of where they are in their journey.</div>
    <div class="panel-section">
      <p class="panel-section-title">What Student Support covers</p>
      <ul class="panel-list">
        <li>Wellbeing check-ins and proactive outreach to students showing signs of disengagement</li>
        <li>Mental health referrals and case management, including crisis response</li>
        <li>Financial hardship assessment and emergency aid distribution</li>
        <li>Disability support plans &mdash; assessment, reasonable adjustments, and review</li>
        <li>Student advocacy &mdash; guidance through formal complaints, academic appeals, and misconduct processes</li>
        <li>Peer support programs and community-building initiatives</li>
      </ul>
    </div>

      <p class="panel-section-title">How it works across stages</p>
      <ul class="panel-list">
        <li><strong>Stages 1&ndash;2:</strong> Support services introduced during enquiry and application; accessibility needs captured early</li>
        <li><strong>Stage 3:</strong> Support referrals initiated during onboarding for students who disclose needs</li>
        <li><strong>Stage 4:</strong> Ongoing monitoring, proactive outreach, and case management during studies</li>
        <li><strong>Stage 5:</strong> Wellbeing check-in ahead of graduation; support for students with outstanding needs</li>
        <li><strong>Stage 6:</strong> Alumni mental health and career transition support</li>
      </ul>

function openPanel() {
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('active');
  document.getElementById('panelBody').scrollTop = 0;
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');

}

// ── Event listeners ───────────────────────────────────────────────────────────
