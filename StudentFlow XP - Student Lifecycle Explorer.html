      line-height: 1.1;

    .page-header .platform-tag {

      color: rgba(17,24,39,0.55);

    /* ── Footer ── */

    .logo-img { height: 34px; width: auto; display: block; flex-shrink: 0; }
    .brand-sep { width: 1px; height: 26px; background: #E2E8F0; flex-shrink: 0; }
    .partner-logo { height: 30px; width: auto; display: block; }

    /* ── Journey bar ── */
    .journey-bar {

      padding-top: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .journey-bar::before,

      flex: 1;
      height: 1px;
    }
    .journey-bar::before {
      background: linear-gradient(to right, transparent, rgba(17,24,39,0.15));
    }
    .journey-bar::after {
      background: linear-gradient(to left, transparent, rgba(17,24,39,0.15));
    }
    .journey-bar-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(17,24,39,0.4);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      white-space: nowrap;
    }
    .journey-bar-arrow {
      font-size: 16px;
      color: rgba(17,24,39,0.25);
    }

    /* ── Lifecycle container ── */
    .lifecycle-wrap {
      padding: 24px 24px;
      overflow-x: auto;
    }

    /* ── Grid ── */
    .lifecycle-grid {
      display: grid;
      grid-template-columns: 76px repeat(6, 1fr);
      min-width: 960px;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }


    /* ── Stage header cells ── */
    .stage-header {
      background: #fff;
      border-bottom: 2px solid #E2E8F0;
      padding: 16px 14px 14px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .stage-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: #111827;
    }
    .stage-num {
      font-size: 9px;
      font-weight: 700;
      color: rgba(17,24,39,0.3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stage-name {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 5px;
    }
    .stage-tagline {
      font-size: 11px;
      color: rgba(17,24,39,0.45);
      line-height: 1.4;
    }

    /* ── Row label cells ── */
    .row-label {
      background: #fff;
      border-right: 1px solid #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 6px;

    .row-label span {
      font-size: 9px;
      font-weight: 700;
      color: rgba(17,24,39,0.45);
      text-align: center;
      line-height: 1.35;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .row-label.top-corner {
      background: #fff;
      border-bottom: 2px solid #E2E8F0;
    }

    /* ── Content cells ── */
    .stage-cell { padding: 12px 10px; }

      border: 1px solid #E2E8F0;
      border-left: 3px solid #E2E8F0;
      border-radius: 7px;
      padding: 9px 11px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.12s;
      user-select: none;
    }
    .w-card:last-of-type { margin-bottom: 0; }
    .w-card:hover {
      border-color: #1F7F7D;
      box-shadow: 0 3px 10px rgba(47,166,164,0.12);

    .w-card-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      color: #111827;
      margin-bottom: 5px;
    }

      font-weight: 600;
      color: rgba(17,24,39,0.4);
      background: #E2E8F0;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
      letter-spacing: 0;

      border: 1px solid #E2E8F0;
      border-left: 3px solid #72D4CF;
      border-radius: 7px;
      padding: 9px 11px;
      cursor: pointer;

      padding: 12px 10px;
      display: flex;
      gap: 10px;

      background: rgba(30,41,59,0.07);

      border-radius: 999px;
      white-space: nowrap;

    /* ── Panel overlay ── */
    .panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.2);
      z-index: 100;
      backdrop-filter: blur(2px);

    /* ── Detail panel ── */
    .detail-panel {

      left: 50%;
      top: 50%;
      transform: translate(-50%, -62%);

      pointer-events: none;
      width: 80vw;
      height: 80vh;

      border-radius: 14px;

      display: flex;
      flex-direction: column;

    }
    .detail-panel.open {
      transform: translate(-50%, -50%);
      opacity: 1;
      pointer-events: auto;
    }

    .panel-header {
      padding: 22px 22px 16px;
      border-bottom: 1px solid #E2E8F0;
      flex-shrink: 0;
      position: relative;
    }
    .panel-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 30px;
      height: 30px;
      border: none;
      background: #F1F5F9;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;

      transition: background 0.15s, color 0.15s;
      line-height: 1;

    .panel-close:hover { background: #111827; color: #fff; }

    .panel-eyebrow {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(17,24,39,0.5);
      margin-bottom: 5px;

    .panel-title {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.25;
      padding-right: 36px;
      margin-bottom: 8px;
      color: #111827;
    }
    .panel-meta { display: flex; gap: 7px; align-items: center; }

    .panel-body {
      padding: 18px 22px 32px;
      overflow-y: auto;
      flex: 1;
    }
    .panel-desc {
      font-size: 14px;
      line-height: 1.65;
      color: rgba(17,24,39,0.72);
      margin-bottom: 14px;

      background: #fffbee;

      line-height: 1.5;

      border-color: rgba(47,166,164,0.25);
      border-left-color: #2FA6A4;
      color: #1F5F5E;

    .panel-section { margin-bottom: 16px; }
    .panel-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: rgba(17,24,39,0.5);
      margin-bottom: 7px;
      padding-bottom: 5px;
      border-bottom: 1px solid #E2E8F0;
    }
    .panel-subsection {
      font-size: 12px;
      font-weight: 700;
      color: #111827;
      margin: 12px 0 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;

    .panel-list { list-style: none; padding: 0; }
    .panel-list li {
      font-size: 13px;
      color: rgba(17,24,39,0.72);
      padding: 3px 0 3px 16px;
      position: relative;
      line-height: 1.55;
    }
    .panel-list li::before {
      content: '';
      position: absolute;
      left: 3px;
      top: 9px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2FA6A4;
    }
    .panel-list li strong { color: #111827; font-weight: 600; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .page-header { padding: 20px 16px 18px; }
      .lifecycle-wrap { padding: 16px 10px 32px; }
      .detail-panel { width: 96vw; height: 90vh; }
    }
  </style>
</head>

// ── Helpers ───────────────────────────────────────────────────────────────────

function platformBadge(platform) {
  const map = {
    apps:  { cls: 'badge-apps',  label: 'Power Apps' },
    pages: { cls: 'badge-pages', label: 'Power Pages' },
    agent: { cls: 'badge-agent', label: 'Copilot Agent' }
  };
  return map[platform] || { cls: 'badge-pages', label: platform };
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Render grid ───────────────────────────────────────────────────────────────

function injectStageStyles() {
  let css = '';
  STAGES.forEach(s => {
    const c = COLORS[s.id];
    if (!c) return;
    css += `
      .stage-header[data-sid="${s.id}"]::before { background: ${c.pill}; }
      [data-sid="${s.id}"] .w-card { border-left-color: ${c.pill}; }
      [data-sid="${s.id}"] .w-card:hover { box-shadow: 0 3px 10px ${c.shadow}; }
    `;
  });
  const el = document.createElement('style');
  el.textContent = css;
  document.head.appendChild(el);
}

function renderGrid() {
  injectStageStyles();
  let html = '';

  // Header row
  html += `<div class="row-label top-corner"></div>`;
  STAGES.forEach((s, i) => {
    const num = String(i + 1).padStart(2, '0');
    html += `
      <div class="stage-header" data-sid="${s.id}">
        <div class="stage-num">${num}</div>
        <div class="stage-name">${esc(s.title)}</div>
        <div class="stage-tagline">${esc(s.tagline)}</div>
      </div>`;
  });

  // Features row
  html += `<div class="row-label"><span>Features</span></div>`;
  STAGES.forEach(s => {
    let cells = '';
    s.features.forEach(f => {
      const systemClass = f.system ? ' w-card-system' : '';
      cells += `
        <div class="w-card${systemClass}" data-stage="${s.id}" data-feature="${esc(f.title)}" role="button" tabindex="0">
          <div class="w-card-title">${esc(f.title)}</div>
        </div>`;
    });
    html += `<div class="stage-cell" data-sid="${s.id}">${cells}</div>`;
  });

  // Common Features row
  html += `<div class="row-label"><span>Common Features</span></div>`;
  html += `<div class="common-feat-span">`;
  COMMON_FEATURES.forEach(f => {
    html += `
      <div class="common-feat-card" data-common="${esc(f.title)}" role="button" tabindex="0">
        <div class="common-feat-eyebrow">Common Feature</div>
        <div class="w-card-title">${esc(f.title)}</div>
      </div>`;
  });
  html += `</div>`;

  // AI Agents row
  html += `<div class="row-label"><span>AI Agents</span></div>`;
  STAGES.forEach(() => { html += `<div class="stage-cell"></div>`; });

  // Integration layer strip
  html += `
    <div class="integration-row" id="integrationRow" role="button" tabindex="0">
      <div class="integration-label">
        <div class="integration-eyebrow">Integration Layer</div>
        <div class="integration-title">Platform Integrations</div>
      </div>
      <div class="integration-desc">Connects with your existing university and government systems — no rip and replace. The accelerator integrates with your Student Management System, government portals, and specialist platforms via standard APIs and connectors.</div>
      <div class="integration-tags">
        <span class="integration-tag">Student Management System</span>
        <span class="integration-tag">StudyLink</span>
        <span class="integration-tag">Placement System</span>
        <span class="integration-tag">VeVo</span>
        <span class="integration-tag">USI</span>
        <span class="integration-tag">LMS</span>
        <span class="integration-tag">Finance System</span>
        <span class="integration-tag">Identity Provider</span>
      </div>
    </div>`;

  document.getElementById('lifecycleGrid').innerHTML = html;

  // Bind events
  document.querySelectorAll('[data-feature]').forEach(el => {
    el.addEventListener('click', () => openFeature(el.dataset.stage, el.dataset.feature));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openFeature(el.dataset.stage, el.dataset.feature); });
  });
  document.querySelectorAll('[data-common]').forEach(el => {
    el.addEventListener('click', () => openCommonFeat(el.dataset.common));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openCommonFeat(el.dataset.common); });
  });
  document.getElementById('integrationRow').addEventListener('click', openIntegration);
  document.getElementById('integrationRow').addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openIntegration(); });
}

// ── Panel renderers ───────────────────────────────────────────────────────────

function renderSections(sections) {
  let html = '';
  sections.forEach(s => {
    if (s.head) html += `<p class="panel-subsection">${esc(s.head)}</p>`;
    if (s.items && s.items.length) {
      html += `<ul class="panel-list">${s.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`;
    }
  });
  return html;
}

function openFeature(stageId, title) {
  const stage = STAGES.find(s => s.id === stageId);
  const f = stage.features.find(x => x.title === title);
  if (!f) return;
  const pb = platformBadge(f.platform);

  document.getElementById('panelEyebrow').textContent = stage.title;
  document.getElementById('panelTitle').textContent = f.title;
  document.getElementById('panelMeta').innerHTML = `
    <span class="badge ${pb.cls}">${esc(pb.label)}</span>
    <span class="badge-duration">${esc(f.type)}</span>`;

  let body = `<p class="panel-desc">${esc(f.desc)}</p>`;
  body += renderSections(f.sections);
  document.getElementById('panelBody').innerHTML = body;
  openPanel();
}

function openPanel() {

}
